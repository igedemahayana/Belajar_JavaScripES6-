<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Console Method</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
  <div class="min-h-screen flex justify-center items-center">
    <div class="flex flex-col">
      <h1 class="font-bold text-xl text-center">Console Method</h1>
      <img src="images/Console Method.png" alt="" class="my-4">
      <p class="font-semibold text-lg">console.debug("Debug");</p>
      <p class="font-semibold text-lg">console.info("Ini Mirip console.log");</p>
      <p class="font-semibold text-lg">console.warn("Ini Peringatan");</p>
      <p class="font-semibold text-lg">console.error("Ini Error");</p>
    </div>
  </div>
  <script src="consoleMethod.js"></script>
</body>

</html>
